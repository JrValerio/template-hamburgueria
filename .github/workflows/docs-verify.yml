name: docs-verify

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-verify.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate backlog-roadmap.json
        run: |
          node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('docs/backlog-roadmap.json', 'utf8');
            const data = JSON.parse(raw);
            const required = ['id','title','horizon','priority','wsjf','acceptanceCriteria','kpi'];
            for (const item of data.items) {
              for (const field of required) {
                if (item[field] === undefined) {
                  console.error('Missing field:', field, 'in item', item.id);
                  process.exit(1);
                }
              }
            }
            console.log('JSON OK —', data.items.length, 'items validated');
          "

      - name: Ensure audit doc exists
        run: test -f docs/auditoria-tecnica-estrategica.md

      - name: Check audit doc has required sections
        run: |
          for section in \
            "Sumário Executivo" \
            "Riscos Críticos" \
            "Matriz de Risco" \
            "Issues Priorizadas" \
            "Dívida Técnica" \
            "Roadmap" \
            "Plano de Negócio" \
            "Regras de Negócio" \
            "Registro de Decisões"; do
            grep -q "$section" docs/auditoria-tecnica-estrategica.md \
              || { echo "Missing section: $section"; exit 1; }
          done
          echo "All required sections present"
